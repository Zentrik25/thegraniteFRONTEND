<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Granite Post">
  <!-- Dark granite background -->
  <rect width="200" height="200" fill="#1d1917"/>
  <!-- Subtle inner shadow / texture gradient -->
  <rect width="200" height="200" fill="url(#grain)" opacity="0.08"/>
  <defs>
    <radialGradient id="grain" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>
  <!-- G letterform — bold serif, cream -->
  <text
    x="102"
    y="150"
    font-family="Georgia,'Times New Roman',serif"
    font-size="148"
    font-weight="700"
    fill="#f4efe6"
    text-anchor="middle"
    letter-spacing="-4"
  >G</text>
  <!-- Red accent bar at bottom -->
  <rect x="0" y="174" width="200" height="26" fill="#981b1e"/>
</svg>

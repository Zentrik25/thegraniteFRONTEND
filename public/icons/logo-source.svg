<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: dark charcoal -->
  <rect width="512" height="512" fill="#2b2b2b"/>

  <!-- Subtle texture overlay (granite effect via noise pattern) -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
  </filter>
  <rect width="512" height="512" fill="#383838" filter="url(#noise)" opacity="0.3"/>

  <!-- Big serif G — drawn as path for pixel-perfect control -->
  <!-- G shape: cream/off-white, bold serif style -->
  <text
    x="256"
    y="320"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="310"
    font-weight="700"
    fill="#f0ebe0"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-8"
  >G</text>

  <!-- "THE GRANITE POST" label -->
  <text
    x="256"
    y="400"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="600"
    fill="#aaaaaa"
    text-anchor="middle"
    letter-spacing="4"
  >THE GRANITE POST</text>

  <!-- Red rule at bottom -->
  <rect x="0" y="432" width="512" height="20" fill="#cc1a20"/>
</svg>
